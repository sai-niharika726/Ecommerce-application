<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShopKart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  {% include "_header.html" %}

  <div class="form-card">
    <h2>Welcome back</h2>
    <p class="sub">Log in to continue to ShopKart</p>

    <div class="form-error" id="error-box"></div>

    <div class="form-field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn btn-primary btn-block" onclick="doLogin()">Log in</button>

    <p style="text-align:center; font-size:13px; color:var(--ink-light); margin-top:18px;">
      New to ShopKart? <a href="/signup" style="color:var(--brand); font-weight:700;">Create an account</a>
    </p>
    <p style="text-align:center; font-size:12px; color:var(--ink-faint); margin-top:10px;">
      Demo admin: admin@shopkart.com / admin123
    </p>
  </div>

  {% include "_footer.html" %}

  <script src="/static/js/app.js"></script>
  <script>
    async function doLogin() {
      const errBox = document.getElementById("error-box");
      errBox.style.display = "none";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        errBox.textContent = "Please enter both email and password.";
        errBox.style.display = "block";
        return;
      }

      try {
        const data = await api("/api/auth/login", { method: "POST", body: { email, password } });
        Auth.setToken(data.access_token);
        const me = await api("/api/auth/me", { auth: true });
        Auth.setUser(me);

        const params = new URLSearchParams(window.location.search);
        const next = params.get("next") || "/";
        window.location.href = next;
      } catch (e) {
        errBox.textContent = e.message;
        errBox.style.display = "block";
      }
    }

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
