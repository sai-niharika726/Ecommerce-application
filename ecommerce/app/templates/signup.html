<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up - ShopKart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  {% include "_header.html" %}

  <div class="form-card">
    <h2>Create your account</h2>
    <p class="sub">Join ShopKart for faster checkout</p>

    <div class="form-error" id="error-box"></div>

    <div class="form-field">
      <label>Full name</label>
      <input type="text" id="name" placeholder="Jane Doe" />
    </div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
    </div>

    <button class="btn btn-primary btn-block" onclick="doSignup()">Create account</button>

    <p style="text-align:center; font-size:13px; color:var(--ink-light); margin-top:18px;">
      Already have an account? <a href="/login" style="color:var(--brand); font-weight:700;">Log in</a>
    </p>
  </div>

  {% include "_footer.html" %}

  <script src="/static/js/app.js"></script>
  <script>
    async function doSignup() {
      const errBox = document.getElementById("error-box");
      errBox.style.display = "none";
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!name || !email || password.length < 6) {
        errBox.textContent = "Please fill all fields. Password must be at least 6 characters.";
        errBox.style.display = "block";
        return;
      }

      try {
        const data = await api("/api/auth/signup", { method: "POST", body: { name, email, password } });
        Auth.setToken(data.access_token);
        const me = await api("/api/auth/me", { auth: true });
        Auth.setUser(me);
        window.location.href = "/";
      } catch (e) {
        errBox.textContent = e.message;
        errBox.style.display = "block";
      }
    }

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSignup();
    });
  </script>
</body>
</html>
