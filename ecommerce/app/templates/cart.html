<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart - ShopKart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  {% include "_header.html" %}

  <div class="container" style="padding-top:24px;">
    <div class="section-title">Shopping cart</div>

    <div id="cart-wrapper" style="display:grid; grid-template-columns: 1fr 320px; gap:24px; align-items:start;">
      <div id="cart-items">
        <div class="skeleton" style="height:100px; margin-bottom:12px;"></div>
        <div class="skeleton" style="height:100px;"></div>
      </div>
      <div class="cart-summary" id="cart-summary" style="display:none;">
        <p style="font-weight:700; font-size:14px; margin:0 0 12px;">Price details</p>
        <div class="summary-row"><span id="summary-count">0 items</span><span id="summary-subtotal">₹0</span></div>
        <div class="summary-row"><span>Delivery</span><span style="color:var(--success);">FREE</span></div>
        <div class="summary-row total"><span>Total amount</span><span id="summary-total">₹0</span></div>
        <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="window.location.href='/checkout'">
          Proceed to checkout
        </button>
      </div>
    </div>
  </div>

  {% include "_footer.html" %}

  <script src="/static/js/app.js"></script>
  <script>
    if (!Auth.isLoggedIn()) {
      window.location.href = "/login?next=/cart";
    }

    async function loadCart() {
      const itemsWrap = document.getElementById("cart-items");
      const summary = document.getElementById("cart-summary");

      try {
        const items = await api("/api/cart", { auth: true });

        if (items.length === 0) {
          itemsWrap.innerHTML = `
            <div class="empty-state">
              <i class="ti ti-shopping-cart-off"></i>
              <p>Your cart is empty.</p>
              <a href="/" class="btn btn-primary" style="margin-top:10px; display:inline-flex;">Continue shopping</a>
            </div>`;
          summary.style.display = "none";
          return;
        }

        itemsWrap.innerHTML = items.map(item => `
          <div class="cart-row" data-item-id="${item.id}">
            <a href="/product/${item.product.id}"><img src="${item.product.image_url}" alt="${escapeHTML(item.product.title)}" /></a>
            <div class="info">
              <p style="font-weight:700; font-size:13px; margin:0 0 2px;">${escapeHTML(item.product.brand)}</p>
              <a href="/product/${item.product.id}"><p style="font-size:13px; color:var(--ink-light); margin:0 0 8px;">${escapeHTML(item.product.title)}</p></a>
              <p style="font-weight:700; font-size:14px; margin:0;">${formatINR(item.product.price)}</p>
            </div>
            <div class="qty-control">
              <button onclick="changeQty(${item.id}, ${item.quantity - 1})">−</button>
              <span>${item.quantity}</span>
              <button onclick="changeQty(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <button class="btn btn-secondary" onclick="removeItem(${item.id})"><i class="ti ti-trash"></i></button>
          </div>
        `).join("");

        const subtotal = items.reduce((sum, i) => sum + Number(i.product.price) * i.quantity, 0);
        const count = items.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById("summary-count").textContent = `Price (${count} item${count > 1 ? "s" : ""})`;
        document.getElementById("summary-subtotal").textContent = formatINR(subtotal);
        document.getElementById("summary-total").textContent = formatINR(subtotal);
        summary.style.display = "block";
      } catch (e) {
        itemsWrap.innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
      }
    }

    async function changeQty(itemId, newQty) {
      if (newQty < 1) return removeItem(itemId);
      try {
        await api(`/api/cart/${itemId}`, { method: "PUT", auth: true, body: { quantity: newQty } });
        loadCart();
        refreshCartBadge();
      } catch (e) {
        showToast(e.message);
      }
    }

    async function removeItem(itemId) {
      try {
        await api(`/api/cart/${itemId}`, { method: "DELETE", auth: true });
        loadCart();
        refreshCartBadge();
      } catch (e) {
        showToast(e.message);
      }
    }

    loadCart();
  </script>
</body>
</html>
